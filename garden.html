<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Stress Monitor AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-bottom: 2px solid #66bb6a;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            font-size: 22px;
            color: #66bb6a;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            color: #a0a0a0;
        }

        .coords {
            font-size: 11px;
            color: #4caf50;
            font-family: monospace;
            margin-top: 5px;
        }

        .viewer-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        model-viewer {
            display: none;
        }

        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #66bb6a;
            border-radius: 10px;
            padding: 16px;
            z-index: 20;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(102, 187, 106, 0.2);
        }

        .stat-row:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
        }

        .stat-label {
            color: #66bb6a;
            font-weight: 600;
        }

        .stat-value {
            color: #e0e0e0;
            font-family: monospace;
        }

        .ar-button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ar-button:hover {
            background: linear-gradient(135deg, #4caf50 0%, #3d8b40 100%);
            transform: translateY(-2px);
        }

        .annotation {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #66bb6a;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 12px;
            max-width: 220px;
            z-index: 25;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(102, 187, 106, 0.3);
        }

        .annotation-header {
            color: #66bb6a;
            font-weight: 600;
            margin-bottom: 8px;
            border-bottom: 1px solid #66bb6a;
            padding-bottom: 6px;
        }

        .annotation-row {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .annotation-label {
            color: #a0a0a0;
        }

        .annotation-value {
            color: #66bb6a;
            font-family: monospace;
            font-weight: 600;
        }

        .close-annotation {
            position: absolute;
            top: 4px;
            right: 8px;
            background: #66bb6a;
            color: #000;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .hint {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(102, 187, 106, 0.1);
            border: 1px solid #66bb6a;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            color: #66bb6a;
            z-index: 15;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .controls-panel {
                max-width: 100%;
                left: 12px;
                right: 12px;
                bottom: 12px;
                padding: 12px;
            }

            .stat-row {
                font-size: 12px;
                margin-bottom: 8px;
            }

            .hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Garden Stress Monitoring</h1>
            <p>Click points for details • Tap AR button to view in space</p>
            <div class="coords">📍 40.331°N, 44.596°E (Bulgaria)</div>
        </div>

        <div class="viewer-wrapper">
            <div class="hint">Click on points to see details →</div>
            <canvas id="canvas"></canvas>

            <model-viewer
                id="arViewer"
                src="pointcloud.glb"
                ar
                ar-modes="quick-look scene-viewer"
                scale="1 1 1"
                style="display:none;">
            </model-viewer>

            <div class="controls-panel">
                <div class="stat-row">
                    <span class="stat-label">Total Points</span>
                    <span class="stat-value">200</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Stressed Plants</span>
                    <span class="stat-value">2 detected</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Garden Area</span>
                    <span class="stat-value">10m × 10m</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Interaction</span>
                    <span class="stat-value">Click any point</span>
                </div>
                <button class="ar-button" onclick="launchAR()">Launch AR Camera</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, mesh, raycaster, mouse;
        let clickedPoint = null;
        let annotationDiv = null;

        function init() {
            const canvas = document.getElementById('canvas');
            const width = window.innerWidth;
            const height = window.innerHeight - 70;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.set(5, 5, 8);
            camera.lookAt(5, 5, 1);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);

            // Load GLB
            const loader = new THREE.GLTFLoader();
            loader.load('pointcloud.glb', (gltf) => {
                mesh = gltf.scene;
                scene.add(mesh);
                animate();
            });

            // Mouse interaction
            canvas.addEventListener('click', onCanvasClick);
            window.addEventListener('resize', onWindowResize);
        }

        function onCanvasClick(event) {
            const canvas = event.target;
            const rect = canvas.getBoundingClientRect();

            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (mesh) {
                const intersects = raycaster.intersectObject(mesh, true);

                if (intersects.length > 0) {
                    const point = intersects[0].point;

                    // Determine stress based on position (mock data)
                    const distToStress = Math.sqrt(
                        Math.pow(point.x - 5, 2) +
                        Math.pow(point.y - 5, 2) +
                        Math.pow(point.z - 0.5, 2)
                    );

                    const isStressed = distToStress < 1.0;
                    const ndre = isStressed ?
                        (0.1 + Math.random() * 0.15).toFixed(2) :
                        (0.4 + Math.random() * 0.2).toFixed(2);

                    showAnnotation(event, point, ndre, isStressed);
                }
            }
        }

        function showAnnotation(event, point, ndre, isStressed) {
            // Remove old annotation
            if (annotationDiv) {
                annotationDiv.remove();
            }

            annotationDiv = document.createElement('div');
            annotationDiv.className = 'annotation';
            annotationDiv.style.left = (event.clientX + 10) + 'px';
            annotationDiv.style.top = (event.clientY - 10) + 'px';

            annotationDiv.innerHTML = `
                <div class="annotation-header">Plant Data</div>
                <div class="annotation-row">
                    <span class="annotation-label">Position</span>
                    <span class="annotation-value">${point.x.toFixed(1)}m</span>
                </div>
                <div class="annotation-row">
                    <span class="annotation-label">NDRE Index</span>
                    <span class="annotation-value">${ndre}</span>
                </div>
                <div class="annotation-row">
                    <span class="annotation-label">Status</span>
                    <span class="annotation-value">${isStressed ? '🔴 Stressed' : '🟢 Healthy'}</span>
                </div>
                <button class="close-annotation" onclick="this.parentElement.remove()">×</button>
            `;

            document.body.appendChild(annotationDiv);

            // Auto-close after 5 seconds
            setTimeout(() => {
                if (annotationDiv && annotationDiv.parentElement) {
                    annotationDiv.remove();
                }
            }, 5000);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (mesh) {
                mesh.rotation.x += 0.0005;
                mesh.rotation.y += 0.001;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight - 70;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function launchAR() {
            const viewer = document.getElementById('arViewer');
            if (viewer) {
                viewer.activateAR();
            }
        }

        init();
    </script>
</body>
</html>
